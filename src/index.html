<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oleksiy Letushev - Front-End Developer</title>
  <link rel="icon" href="./images/logo.svg" sizes="any" type="image/svg+xml">
  <link rel="icon" href="./images/favicon16.png" sizes="16x16" type="image/png">
  <link rel="icon" href="./images/favicon32.png" sizes="32x32" type="image/png">
  <link rel="icon" href="./images/favicon192.png" sizes="192x192" type="image/png">
  <link rel="apple-touch-icon" sizes="180x180" href="./images/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;700&display=swap" rel="stylesheet"
  >
</head>
<body>
  <div class="page-wrapper">
    <header class="banner">
      <div class="banner__background"></div>
      <div class="banner__content">
        <div class="banner__photo-container">
          <img
            class="banner__photo"
            src="./images/photo.png"
            srcset="./images/photo2x.png 2x"
            alt="Oleksiy Letushev photo"
          />
        </div>
        <div class="banner__main">
          <div class="greeting banner__greeting">
            <img
              src="./images/photo-small.jpeg"
              alt="Oleksiy Letushev photo"
              class="greeting__photo"
            />
            <div class="greeting__main">
              <p class="greeting__text">
                Hi! My name is <span class="greeting__name">Oleksiy Letushev</span><br />
                I love coding and painting. That is why I am a <strong>front-end developer</strong>.
              </p>
              <a
                download
                href="images/logo.svg"
                class="greeting__button"
              >
                Resume
              </a>
            </div>
          </div>
          <div class="animated-logo banner__animated-logo">
            <canvas class="animated-logo__canvas">
              <!-- Fallback image -->
              <img
                class="animated-logo__static-img"
                src="./images/static-logo.svg"
                alt="logo"
              />
            </canvas>
          </div>
          <nav class="nav banner__nav">
            <ul class="nav__list">
              <li class="nav__item">
                <a class="nav__link" href="#about">
                  About me
                </a>
              </li>
              <li class="nav__item">
                <a class="nav__link" href="#projects">
                  Projects
                </a>
              </li>
            </ul>
          </nav>
          <ul class="social-links banner__social-links">
            <li class="social-links__item">
              <a
                target="_blank"
                class="social-links__link" 
                href="https://github.com/Letushev"
              >
                <img
                  class="social-links__img"
                  src="./images/github.svg"
                  alt="GitHub logo" 
                />
              </a>
            </li>
            <li class="social-links__item">
              <a
                target="_blank"
                class="social-links__link"
                href="https://www.linkedin.com/in/olexiy-letushev"
              >
                <img
                  class="social-links__img"
                  src="./images/linkedin.svg"
                  alt="LinkedIn logo"
                />
              </a>
            </li>
            <li class="social-links__item">
              <a
                target="_blank"
                class="social-links__link"
                href="https://t.me/letushev"
              >
                <img
                  class="social-links__img"
                  src="./images/telegram.svg"
                  alt="Telegram logo"
                />
              </a>
            </li>
            <li class="social-links__item">
              <a
                target="_blank"
                class="social-links__link"
                href="https://www.instagram.com/letushev_leta"
              >
                <img
                  class="social-links__img"
                  src="./images/instagram.svg"
                  alt="Instagram logo"
                />
              </a>
            </li>
          </ul>
        </div>
      </div>
    </header>
  </div>
</body>
</html>
